# DigitalOcean App Platform spec — ElderCare Academy API (NestJS + BullMQ).
#
# Region tor1 (Toronto) → Canadian data residency, mirroring ElderCare (which
# runs on DO App Platform TOR1). The BullMQ processors run IN-PROCESS inside the
# API (they are Nest providers), so no separate worker component is needed.
#
# COST-MINIMISED, NO-AWS setup (owner decision 2026-07-21):
#   - DB    : a separate `academy` database on the EXISTING eldercare-pg-prod
#             cluster (no new cluster bill). Paste its connection string into
#             DATABASE_URL (SECRET) below — no `databases:` block, so DO won't
#             provision a new paid cluster.
#   - Redis : the EXISTING eldercare-redis-prod Valkey (BullMQ uses its own key
#             prefixes; no collision). Paste into REDIS_URL (SECRET).
#   - Files : DO Spaces (TOR1), S3-compatible — see AWS_ENDPOINT_URL_S3. No AWS.
#   - Email : Resend is OPTIONAL and left unset — the Academy sender no-ops
#             safely, and training-expiry reminders come from ElderCare's
#             credential-expiry emails (via cert flow-back). Add SMTP later if
#             an Academy-native email need appears.
#
# Secrets (type: SECRET, no value here) are set in the DO dashboard / doctl.
#   doctl apps create --spec .do/academy-api.app.yaml
#
name: academy-api
region: tor1

# Run pending Prisma migrations before each deploy goes live.
jobs:
  - name: migrate
    kind: PRE_DEPLOY
    dockerfile_path: apps/api/Dockerfile
    source_dir: /
    github:
      repo: Chukwuemekaokafor77/LMS
      branch: main
    run_command: node_modules/.bin/prisma migrate deploy --schema apps/api/prisma/schema.prisma
    envs:
      # Use the DIRECT connection (port 25060), NOT a transaction-mode pool —
      # pooled connections choke on DDL.
      - key: DATABASE_URL
        scope: RUN_TIME
        type: SECRET

services:
  - name: api
    dockerfile_path: apps/api/Dockerfile
    source_dir: /
    github:
      repo: Chukwuemekaokafor77/LMS
      branch: main
      deploy_on_push: true
    http_port: 4000
    instance_count: 1
    instance_size_slug: apps-s-1vcpu-1gb
    health_check:
      http_path: /health
    # Bind the API to its own hostname (its routes live at root: /me, /auth/sso,
    # /webhooks/...). ElderCare's entitlement webhook + the web app's SSR calls
    # target this host.
    domains:
      - domain: api.academy.eldercare-companion.com
        type: PRIMARY
    envs:
      - key: NODE_ENV
        value: production
      - key: API_PORT
        value: "4000"
      # Existing eldercare-pg-prod cluster, database `academy` (pooled URL is fine
      # for the app; the migrate job above uses the direct URL):
      - key: DATABASE_URL
        scope: RUN_TIME
        type: SECRET
      # Existing eldercare-redis-prod Valkey (rediss://…):
      - key: REDIS_URL
        scope: RUN_TIME
        type: SECRET
      - key: WEB_BASE_URL
        scope: RUN_TIME
        value: https://academy.eldercare-companion.com

      # --- ElderCare integration (Seam 1 exchange, Seam 3 flow-back, entitlement) ---
      - key: ELDERCARE_API_URL
        scope: RUN_TIME
        value: https://api.eldercare-companion.com
      - key: ACADEMY_EXCHANGE_SECRET   # shared HMAC secret — MUST equal ElderCare's ACADEMY_EXCHANGE_SECRET
        scope: RUN_TIME
        type: SECRET
      - key: ACADEMY_SESSION_SECRET    # signs the Academy's own 8h session cookies
        scope: RUN_TIME
        type: SECRET

      # --- Mux (video) ---
      - key: MUX_TOKEN_ID
        scope: RUN_TIME
        type: SECRET
      - key: MUX_TOKEN_SECRET
        scope: RUN_TIME
        type: SECRET
      - key: MUX_WEBHOOK_SECRET        # created AFTER first deploy (needs the API URL), then set + redeploy
        scope: RUN_TIME
        type: SECRET
      - key: MUX_SIGNING_KEY_ID
        scope: RUN_TIME
        type: SECRET
      - key: MUX_SIGNING_KEY_PRIVATE   # the signing key's base64 private key (pairs with MUX_SIGNING_KEY_ID)
        scope: RUN_TIME
        type: SECRET

      # --- Object storage: DO Spaces (TOR1), S3-compatible, NO AWS ---
      # The AWS SDK reads AWS_ENDPOINT_URL_S3 from the env natively (no code
      # change — same mechanism the local MinIO dev setup uses). The AWS_* names
      # are just S3 config; the values are DO Spaces keys.
      - key: AWS_ENDPOINT_URL_S3
        value: https://tor1.digitaloceanspaces.com
      - key: AWS_REGION
        value: tor1                    # SDK requires a value; Spaces ignores it
      - key: AWS_S3_BUCKET
        value: academy-uploads-prod    # a Space you create in TOR1 (set it Private)
      - key: AWS_ACCESS_KEY_ID         # DO Spaces access key (Spaces → Access Keys)
        scope: RUN_TIME
        type: SECRET
      - key: AWS_SECRET_ACCESS_KEY
        scope: RUN_TIME
        type: SECRET

      # --- Email (OPTIONAL) ---
      # Leave RESEND_API_KEY unset for launch — the sender no-ops and ElderCare
      # sends the training-expiry reminders. Uncomment to enable Academy email:
      # - key: RESEND_API_KEY
      #   scope: RUN_TIME
      #   type: SECRET
      # - key: EMAIL_FROM
      #   value: no-reply@academy.eldercare-companion.com
