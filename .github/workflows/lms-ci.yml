name: LMS CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    # Real Postgres + Redis so the LMS-C1/C2 integration tests can run against a
    # live DB in CI (see LMS_PRE_LAUNCH_AUDIT.md — LMS-H2). Credentials match
    # docker-compose.yml / .env.example so local and CI share one DATABASE_URL shape.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: maple
          POSTGRES_PASSWORD: maple
          POSTGRES_DB: maple_care
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U maple"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://maple:maple@localhost:5432/maple_care
      REDIS_URL: redis://localhost:6379
      # Build-time placeholders so `next build` can prerender the Clerk-wrapped
      # pages (e.g. /dashboard) — without a publishable key ClerkProvider throws
      # at prerender. The publishable key is non-secret (the canonical Clerk
      # `clerk.example.com` example key); the secret is a throwaway that is never
      # used to reach Clerk since no network calls happen during a static build.
      # Real keys live only in the developer's untracked .env (see LMS-M1).
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_Y2xlcmsuZXhhbXBsZS5jb20k
      CLERK_SECRET_KEY: sk_test_ci_build_placeholder_not_a_real_key0

    steps:
      - uses: actions/checkout@v4

      # No `version:` here — the root package.json `packageManager: pnpm@9.12.0`
      # pin is the single source of truth. Passing both makes action-setup@v4
      # fail with ERR_PNPM_BAD_PM_VERSION.
      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @maple-care/api exec prisma generate

      - name: Validate Prisma schema
        run: pnpm --filter @maple-care/api exec prisma validate

      - name: Typecheck
        run: pnpm -r run typecheck

      - name: Lint
        run: pnpm -r run lint

      - name: Apply migrations
        run: pnpm --filter @maple-care/api exec prisma migrate deploy

      # Drift gate: the live DB (built only from committed migrations) must match
      # schema.prisma's datamodel. A schema edit without a matching migration —
      # or a migration without a schema update — produces a non-empty diff and
      # `--exit-code` fails the job. Reuses the migrate-deploy'd DB, no shadow DB.
      - name: Schema drift gate
        run: |
          pnpm --filter @maple-care/api exec prisma migrate diff \
            --from-schema-datasource ./prisma/schema.prisma \
            --to-schema-datamodel ./prisma/schema.prisma \
            --exit-code

      # Runs the unit + real-DB integration/e2e suites against the service DBs
      # above, and enforces the LMS-C2 service-layer coverage floor (60%, with
      # thin SDK adapters excluded — see vitest.config.ts).
      - name: Run API tests + coverage gate
        run: pnpm --filter @maple-care/api exec vitest run --coverage

      - name: Build API
        run: pnpm --filter @maple-care/api build

      - name: Build Web
        run: pnpm --filter @maple-care/web build
